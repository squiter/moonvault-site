<!doctype html>
<html lang="{{ site.lang | default: 'en' }}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#120b17" />
    <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description | escape }}" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="{{ page.url | absolute_url }}" />
    <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}" />
    <meta property="og:description" content="{{ page.description | default: site.description | escape }}" />
    <meta property="og:image" content="{{ '/assets/moonvault.png' | absolute_url }}" />
    <meta property="og:type" content="{% if page.date %}article{% else %}website{% endif %}" />
    <meta property="og:url" content="{{ page.url | absolute_url }}" />
    <link rel="icon" type="image/png" href="{{ '/assets/moonvault.png' | relative_url }}" />
    <link rel="apple-touch-icon" href="{{ '/assets/moonvault.png' | relative_url }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ '/assets/styles.css' | relative_url }}" />
    {% feed_meta %}
  </head>
  <body class="{{ page.body_class | default: 'blog-page' }}">
    <div class="blog-shell">
      <header class="blog-masthead">
        <a class="blog-brand" href="{{ '/blog/' | relative_url }}" aria-label="Moonvault blog home">
          <img src="{{ '/assets/moonvault.png' | relative_url }}" alt="" width="52" height="52" />
          <span>
            <strong>Moonvault</strong>
            <small>The Journal</small>
          </span>
        </a>
        <a class="blog-home-link" href="{{ '/' | relative_url }}">Visit Moonvault</a>
      </header>

      {{ content }}

      <footer class="blog-footer">
        <span>Moonvault &middot; A vault for the game master.</span>
        <a href="{{ '/blog/feed.xml' | relative_url }}">RSS feed</a>
      </footer>
    </div>
  </body>
</html>

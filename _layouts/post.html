---
layout: default
---
<main class="blog-main">
  <article class="blog-post">
    <header class="post-header">
      <p class="eyebrow">{{ page.date | date: "%B %-d, %Y" }}</p>
      <h1>{{ page.title }}</h1>
      {% if page.description %}
        <p class="post-deck">{{ page.description }}</p>
      {% endif %}
    </header>

    <div class="ornament" aria-hidden="true">
      <span></span><span class="dot"></span><span></span>
    </div>

    <div class="post-content">
      {{ content }}
    </div>

    <nav class="post-navigation" aria-label="Blog navigation">
      <a href="{{ '/blog/' | relative_url }}">&larr; All journal entries</a>
    </nav>
  </article>
</main>
